name: Validate preseason dry run v1

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_preseason_dry_run_v1.py tests/test_preseason_dry_run_status_v1.py
      - name: Rebuild deterministic report
        run: |
          mkdir -p runtime/reports
          python scripts/validate_preseason_dry_run_v1.py --output runtime/reports/preseason-dry-run-v1.json
          python - <<'PY'
          import json
          from pathlib import Path
          committed = json.loads(Path("data/preseason-dry-run-current-status-v1.json").read_text())
          rebuilt = json.loads(Path("runtime/reports/preseason-dry-run-v1.json").read_text())
          if committed != rebuilt:
              raise SystemExit("rebuilt preseason report differs from committed status")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: preseason-dry-run-v1
          path: runtime/reports/preseason-dry-run-v1.json
          if-no-files-found: error
          retention-days: 14
