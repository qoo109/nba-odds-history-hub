name: Validate schedule output gate v1

on:
  pull_request:
    paths:
      - "config/source-registry.json"
      - "config/schedule-adapter-output-gate-contract-v1.json"
      - "data/fixtures/official-schedule-adapter-v1.json"
      - "src/nba_odds_history_hub/schedule_adapter.py"
      - "src/nba_odds_history_hub/schedule_output_gate.py"
      - "scripts/validate_metadata_registry_output_gate_v1.py"
      - "tests/test_schedule_adapter_output_gate_v1.py"
      - ".github/workflows/validate-schedule-output-gate-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_schedule_adapter_output_gate_v1.py tests/test_source_provider_schedule_adapter_v1.py
      - name: Build aggregate report
        run: |
          python scripts/validate_metadata_registry_output_gate_v1.py \
            --output runtime/reports/schedule_output_gate_v1.json
      - name: Enforce fixture-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("runtime/reports/schedule_output_gate_v1.json").read_text())
          assert report["checksFailed"] == 0
          assert report["outputGate"]["acceptedCount"] == 2
          assert report["outputGate"]["excludedCount"] == 4
          assert report["outputGate"]["databaseWrites"]["sourceEventsRegistered"] == 2
          assert report["outputGate"]["databaseWrites"]["scheduleVersionsInserted"] == 2
          assert report["outputGate"]["databaseWrites"]["mappingAuditDecisionsWritten"] == 2
          assert report["outputGate"]["databaseWrites"]["canonicalEventsCreated"] == 0
          assert report["outputGate"]["databaseWrites"]["snapshotRowsWritten"] == 0
          assert report["quality"]["fixtureOnly"] is True
          assert report["quality"]["networkCallsMade"] is False
          assert report["quality"]["externalScheduleRead"] is False
          assert report["quality"]["crossRepositoryWrite"] is False
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: schedule-output-gate-v1
          path: runtime/reports/schedule_output_gate_v1.json
          if-no-files-found: error
          retention-days: 14
