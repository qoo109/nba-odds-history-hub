name: Verify Google Drive secret once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-drive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Validate secret and configure Drive
        shell: bash
        run: |
          test -n "$GDRIVE_FOLDER_ID"
          test -n "$GDRIVE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gdrive-service-account.json"
          chmod 600 "$RUNNER_TEMP/gdrive-service-account.json"
          jq -e '.type == "service_account" and (.client_email | type == "string") and (.private_key | type == "string") and (.project_id | type == "string")' \
            "$RUNNER_TEMP/gdrive-service-account.json" >/dev/null
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null 2>&1
          rclone config create hubdrive drive \
            scope drive \
            service_account_file "$RUNNER_TEMP/gdrive-service-account.json" \
            root_folder_id "$GDRIVE_FOLDER_ID" \
            --non-interactive >/dev/null

      - name: Verify Drive folder read access
        shell: bash
        run: rclone lsd hubdrive:

      - name: Attempt Drive folder write and save diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/drive-verification" drive-verification-results
          printf 'Google Drive verification run %s at %s\n' \
            "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > "$RUNNER_TEMP/drive-verification/verification.txt"
          rclone copy "$RUNNER_TEMP/drive-verification" \
            "hubdrive:06-logs/secret-verification/$GITHUB_RUN_ID" \
            --create-empty-src-dirs -vv \
            > drive-verification-results/write.log 2>&1
          code=$?
          echo "$code" > drive-verification-results/write-exit-code.txt
          cat drive-verification-results/write.log
          exit 0

      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drive-secret-verification-${{ github.run_id }}
          path: drive-verification-results/
          if-no-files-found: error
          retention-days: 7
