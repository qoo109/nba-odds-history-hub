name: Validate approval state machine v1

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_approval_state_machine_v1.py
      - name: Build aggregate state machine report
        run: |
          mkdir -p runtime/reports
          python scripts/validate_approval_state_machine_v1.py --output runtime/reports/preseason-approval-state-machine-v1.json
      - uses: actions/upload-artifact@v4
        with:
          name: preseason-approval-state-machine-v1
          path: runtime/reports/preseason-approval-state-machine-v1.json
          if-no-files-found: error
          retention-days: 14
