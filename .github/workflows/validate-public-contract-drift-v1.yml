name: Validate public contract drift v1

on:
  pull_request:
    paths:
      - "data/public/readiness-release-manifest-v1.json"
      - "data/public/offseason-readiness.json"
      - "data/public/offseason-metadata-readiness-v1.json"
      - "data/public/readiness-contract-drift-report-v1.json"
      - "release-index.html"
      - "scripts/build_public_contract_drift_report_v1.py"
      - "tests/test_public_readiness_contracts.py"
      - "tests/test_readiness_release_index_drift_v1.py"
      - ".github/workflows/validate-public-contract-drift-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run compatibility and drift tests
        run: pytest -q tests/test_public_readiness_contracts.py tests/test_readiness_release_index_drift_v1.py
      - name: Rebuild deterministic drift report
        run: |
          python scripts/build_public_contract_drift_report_v1.py \
            --output runtime/reports/readiness-contract-drift-v1.json
      - name: Enforce repository-only ready state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("runtime/reports/readiness-contract-drift-v1.json").read_text())
          assert report["checksFailed"] == 0
          assert report["driftCount"] == 0
          assert report["quality"]["repositoryOnly"] is True
          assert report["quality"]["networkCallsMade"] is False
          assert report["quality"]["externalFilesRead"] is False
          assert report["quality"]["crossRepositoryWrite"] is False
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: public-contract-drift-v1
          path: runtime/reports/readiness-contract-drift-v1.json
          if-no-files-found: error
          retention-days: 14
