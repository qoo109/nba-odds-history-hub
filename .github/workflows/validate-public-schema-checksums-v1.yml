name: Validate public schema checksums v1

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_public_contract_schema_checksums_v1.py
      - name: Rebuild manifest
        run: |
          mkdir -p runtime/reports
          python scripts/build_public_governance_checksums_v1.py --output runtime/reports/public-governance-checksums-v1.json
          cmp data/public/public-governance-checksums-v1.json runtime/reports/public-governance-checksums-v1.json
      - uses: actions/upload-artifact@v4
        with:
          name: public-schema-checksums-v1
          path: runtime/reports/public-governance-checksums-v1.json
          if-no-files-found: error
          retention-days: 14
