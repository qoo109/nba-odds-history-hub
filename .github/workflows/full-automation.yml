name: Daily source health and Drive backup

on:
  push:
    branches:
      - run/source-health-once-20260720
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate the pipeline without importing an odds snapshot
        required: false
        default: true
        type: boolean
      enable_odds_capture:
        description: Run owner-configured odds intake (requires both odds URL secrets)
        required: false
        default: false
        type: boolean
  schedule:
    # 09:11 Asia/Taipei. Scheduled runs are source-health only.
    - cron: "11 1 * * *"

permissions:
  contents: read

concurrency:
  group: nba-odds-history-hub-full-automation
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  TZ: Asia/Taipei
  GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
  GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
  # Odds URLs are exposed only for an explicit manual run. Daily scheduled runs
  # and this isolated one-time push run remain source-health/backup jobs.
  ODDS_MATCHUPS_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_odds_capture && secrets.ODDS_MATCHUPS_URL || '' }}
  ODDS_STRAIGHT_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_odds_capture && secrets.ODDS_STRAIGHT_URL || '' }}
  ODDS_SOURCE_ID: ${{ vars.ODDS_SOURCE_ID || 'configured_http_source' }}
  ODDS_SOURCE_NAME: ${{ vars.ODDS_SOURCE_NAME || 'Configured HTTP odds source' }}
  ODDS_BOOKMAKER_ID: ${{ vars.ODDS_BOOKMAKER_ID || 'configured_bookmaker' }}
  ODDS_BOOKMAKER_NAME: ${{ vars.ODDS_BOOKMAKER_NAME || 'Configured bookmaker' }}
  AUTOMATION_DRY_RUN: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) || false }}

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install and configure rclone
        if: ${{ env.GDRIVE_SERVICE_ACCOUNT_JSON != '' && env.GDRIVE_FOLDER_ID != '' }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gdrive-service-account.json"
          chmod 600 "$RUNNER_TEMP/gdrive-service-account.json"
          rclone config create hubdrive drive \
            scope drive \
            service_account_file "$RUNNER_TEMP/gdrive-service-account.json" \
            root_folder_id "$GDRIVE_FOLDER_ID" \
            --non-interactive

      - name: Restore state and SQLite from Google Drive
        if: ${{ env.GDRIVE_SERVICE_ACCOUNT_JSON != '' && env.GDRIVE_FOLDER_ID != '' }}
        run: |
          mkdir -p runtime/state data/databases
          rclone copy hubdrive:07-state runtime/state --ignore-errors --no-traverse
          rclone copy hubdrive:02-sqlite data/databases \
            --include "odds_history.sqlite" --ignore-errors --no-traverse

      - name: Run source health, optional odds intake, and backup
        run: |
          python scripts/automation/full_pipeline.py \
            --config config/automation-sources.json \
            --runtime-root runtime \
            --database data/databases/odds_history.sqlite

      - name: Run test suite
        if: always()
        run: pytest -q

      - name: Record Drive-not-configured status
        if: ${{ always() && (env.GDRIVE_SERVICE_ACCOUNT_JSON == '' || env.GDRIVE_FOLDER_ID == '') }}
        run: |
          mkdir -p runtime/reports
          echo "Google Drive upload skipped: configure GDRIVE_SERVICE_ACCOUNT_JSON and GDRIVE_FOLDER_ID." \
            | tee runtime/reports/drive_upload_skipped.txt

      - name: Upload safe run evidence to GitHub Actions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-odds-hub-automation-${{ github.run_id }}
          path: |
            runtime/reports/
            runtime/backups/*.sha256
            runtime/exports/
          if-no-files-found: warn
          retention-days: 14

      - name: Copy immutable data and current state to Google Drive
        if: ${{ always() && env.GDRIVE_SERVICE_ACCOUNT_JSON != '' && env.GDRIVE_FOLDER_ID != '' }}
        run: |
          rclone copy runtime/source_archive hubdrive:01-raw-snapshots/source_archive --immutable --create-empty-src-dirs
          rclone copy runtime/incoming hubdrive:00-incoming/odds_snapshots --immutable --create-empty-src-dirs
          rclone copy runtime/backups hubdrive:05-backups --immutable --create-empty-src-dirs
          rclone copy runtime/exports hubdrive:03-exports --create-empty-src-dirs
          rclone copy runtime/reports hubdrive:04-source-health --create-empty-src-dirs
          rclone copy runtime/state hubdrive:07-state --create-empty-src-dirs
          rclone copy data/databases hubdrive:02-sqlite \
            --include "odds_history.sqlite" --create-empty-src-dirs
