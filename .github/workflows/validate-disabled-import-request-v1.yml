name: Validate disabled import request v1

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_disabled_import_request_v1.py
      - name: Build aggregate disabled request report
        run: |
          mkdir -p runtime/reports
          python scripts/validate_disabled_import_request_v1.py \
            --output runtime/reports/disabled-import-request-contract-v1.json
      - uses: actions/upload-artifact@v4
        with:
          name: disabled-import-request-contract-v1
          path: runtime/reports/disabled-import-request-contract-v1.json
          if-no-files-found: error
          retention-days: 14
