name: Validate offseason database and dashboard v1

on:
  pull_request:
    paths:
      - "sql/schema.sql"
      - "src/nba_odds_history_hub/mapping.py"
      - "tests/test_offseason_mapping_database.py"
      - "scripts/validate_offseason_database_dashboard_v1.py"
      - "data/public/offseason-readiness.json"
      - "readiness.html"
      - "docs/offseason-database-dashboard-v1.md"
      - ".github/workflows/validate-offseason-database-dashboard-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-offseason-database-dashboard-v1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  database-dashboard-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Compile new modules
        run: |
          python -m py_compile src/nba_odds_history_hub/mapping.py
          python -m py_compile scripts/validate_offseason_database_dashboard_v1.py

      - name: Run mapping database tests
        run: pytest -q tests/test_offseason_mapping_database.py

      - name: Run aggregate database and dashboard validation
        run: |
          python scripts/validate_offseason_database_dashboard_v1.py \
            --output runtime/reports/offseason_database_dashboard_v1.json

      - name: Enforce fixture-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("runtime/reports/offseason_database_dashboard_v1.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          assert report["formalState"] == "OFFSEASON_DATABASE_CONTRACT_AND_DASHBOARD_FIXTURES_V1_READY"
          assert report["checksFailed"] == 0
          assert report["fixtureDatabase"]["formalState"] == "OFFSEASON_MAPPING_DATABASE_READY"
          assert report["fixtureDatabase"]["database"]["scheduleVersionCount"] == 3
          assert report["fixtureDatabase"]["database"]["currentScheduleCount"] == 2
          assert report["fixtureDatabase"]["database"]["auditDecisionCount"] == 2
          assert report["fixtureDatabase"]["mapping"]["verifiedEventCount"] == 1
          assert report["quality"]["fixtureOnly"] is True
          assert report["quality"]["networkCallsMade"] is False
          assert report["quality"]["externalScheduleRead"] is False
          assert report["quality"]["rawRowsEmitted"] == 0
          assert report["quality"]["rawFilesEmitted"] is False
          assert report["quality"]["crossRepositoryWrite"] is False
          assert path.stat().st_size <= 1048576
          PY

      - name: Upload aggregate validation report
        uses: actions/upload-artifact@v4
        with:
          name: offseason-database-dashboard-v1
          path: runtime/reports/offseason_database_dashboard_v1.json
          if-no-files-found: error
          retention-days: 14
