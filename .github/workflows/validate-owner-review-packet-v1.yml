name: Validate owner review packet v1

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: pytest -q tests/test_owner_review_packet_v1.py
      - name: Rebuild deterministic owner review status
        run: |
          mkdir -p runtime/reports
          python scripts/validate_owner_review_packet_v1.py --output runtime/reports/preseason-owner-review-packet-v1.json
          cmp data/preseason-owner-review-current-status-v1.json runtime/reports/preseason-owner-review-packet-v1.json
      - uses: actions/upload-artifact@v4
        with:
          name: preseason-owner-review-packet-v1
          path: runtime/reports/preseason-owner-review-packet-v1.json
          if-no-files-found: error
          retention-days: 14
